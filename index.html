<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>산:우리 일정 생성기</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #0f101a; color: white; -webkit-tap-highlight-color: transparent; }
        .animate-bottom-up { animation: slideUp 0.4s ease-out; }
        @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }
        input, select { border: none !important; outline: none !important; }
        .neon-btn { background: #111421; color: #7dd3fc; border: 1px solid rgba(56, 189, 248, 0.4); box-shadow: 0 0 10px rgba(56, 189, 248, 0.15); transition: all 0.2s ease; font-weight: 700; }
        .neon-btn:hover { border-color: rgba(56, 189, 248, 0.8); box-shadow: 0 0 15px rgba(56, 189, 248, 0.3); }
        #admin_modal { backdrop-filter: blur(10px); display: none; }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">

    <div class="bg-[#1a1c2e] w-full max-w-md rounded-[2.5rem] overflow-hidden shadow-2xl border border-white/5 animate-bottom-up relative">
        <div class="p-6 border-b border-white/5 flex justify-between items-center bg-slate-800/50">
            <div>
                <h3 class="text-white font-black text-lg tracking-tight">NOTICE GENERATOR</h3>
                <p class="text-emerald-500 text-[10px] font-bold uppercase tracking-widest">San:Woori Official</p>
            </div>
            <button onclick="openAdminAuth()" class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-white/10 transition-colors text-gray-400 hover:text-sky-400">
                <span class="material-symbols-outlined text-[24px]">settings</span>
            </button>
        </div>

        <div class="p-6 max-h-[75vh] overflow-y-auto space-y-4 custom-scrollbar">
            <div>
                <label class="text-[10px] font-black text-orange-400 uppercase tracking-wider ml-1 mb-1.5 block">🔴 산행지 (자동완성 저장중)</label>
                <div class="flex items-center gap-2">
                    <input type="text" id="n_mt" placeholder="어디로 가나요?" class="w-[45%] bg-white/5 h-[42px] rounded-xl text-white text-sm px-3 focus:ring-1 ring-emerald-500/50 outline-none">
                    <select id="official_mt_select" class="w-[30%] h-[42px] bg-slate-800 border border-white/10 rounded-xl text-white text-[10px] text-center font-bold px-1 appearance-none">
                        <option value="">인증 산 ⛰️</option>
                    </select>
                    <div class="w-[25%] flex items-center p-0.5 bg-white/5 rounded-xl border border-white/5 h-[42px]">
                        <input type="radio" name="n_pickup" id="p_ok" value="(픽업 가능)" class="hidden peer/ok">
                        <label for="p_ok" class="flex-1 h-full flex items-center justify-center rounded-lg text-[9px] font-black text-gray-400 cursor-pointer peer-checked/ok:bg-blue-600 peer-checked/ok:text-white">픽업</label>
                        <input type="radio" name="n_pickup" id="p_no" value="(픽업 불가)" class="hidden peer/no">
                        <label for="p_no" class="flex-1 h-full flex items-center justify-center rounded-lg text-[9px] font-black text-gray-400 cursor-pointer peer-checked/no:bg-red-600 peer-checked/no:text-white">불가</label>
                    </div>
                </div>
            </div>

            <div><label class="text-[9px] font-black text-gray-500 ml-1 mb-1 block uppercase">🟠 일시</label>
                <div class="flex items-center w-full gap-2">
                    <div class="flex-1 flex items-center bg-white/5 rounded-xl px-3 h-[42px]"><input type="number" id="n_month" placeholder="0" class="w-full bg-transparent text-white text-sm text-center">월<input type="number" id="n_day" placeholder="0" class="w-full bg-transparent text-white text-sm text-center">일</div>
                    <select id="n_ampm" class="w-[65px] h-[42px] bg-slate-800 rounded-xl text-white text-[11px] text-center"><option value="오전">오전</option><option value="오후">오후</option></select>
                    <div class="w-[105px] flex items-center bg-white/5 rounded-xl px-2 h-[42px]"><input type="number" id="n_hour" placeholder="0" class="w-full bg-transparent text-white text-sm text-center">시<input type="number" id="n_min" placeholder="00" class="w-full bg-transparent text-white text-sm text-center">분</div>
                </div>
            </div>

            <div class="grid grid-cols-2 gap-3">
                <div class="flex flex-col"><label class="text-[9px] font-black text-gray-500 ml-1 mb-1 block">🟡 집결지</label><input type="text" id="n_meet" placeholder="만남 장소" class="w-full bg-white/5 h-[42px] rounded-xl text-white text-sm px-4"></div>
                <div class="flex flex-col"><label class="text-[9px] font-black text-gray-500 ml-1 mb-1 block">🟢 소요시간</label><div class="flex items-center bg-white/5 rounded-xl px-2 h-[42px] gap-0.5"><span class="text-gray-400 text-[10px] shrink-0">약</span><input type="text" id="n_time_h" class="w-full bg-transparent text-white text-sm text-right"><span class="text-gray-600 text-[10px]">시간</span><input type="text" id="n_time_m" class="w-full bg-transparent text-white text-sm text-right"><span class="text-gray-600 text-[10px]">분</span></div></div>
            </div>

            <div><label class="text-[9px] font-black text-gray-500 ml-1 mb-1 block">🔵 산행코스 (스페이스 3번 = ' - ')</label><input type="text" id="n_course" class="w-full bg-white/5 h-[42px] rounded-xl text-white text-sm px-4"></div>

            <div class="grid grid-cols-2 gap-3">
                <div class="flex flex-col"><label class="text-[9px] font-black text-gray-500 ml-1 mb-1 block">⚪️ 거리</label><div class="flex items-center bg-white/5 rounded-xl pr-4 h-[42px]"><input type="text" id="n_dist" class="w-full bg-transparent text-white text-sm text-right px-2"><span class="text-[10px] text-gray-600 font-black">km</span></div></div>
                <div class="flex flex-col"><label class="text-[9px] font-black text-gray-500 ml-1 mb-1 block">🟣 난이도</label><select id="n_lv" class="w-full h-[42px] bg-slate-800 px-3 rounded-xl text-white text-[11px]"><option value="하 (산책)">하 (산책)</option><option value="중하 (평범)">중하 (평범)</option><option value="중 (약간힘듦)">중 (약간힘듦)</option><option value="중상 (힘듦)">중상 (힘듦)</option><option value="상 (매우힘듦)">상 (매우힘듦)</option></select></div>
            </div>

            <div><label class="text-[9px] font-black text-gray-500 ml-1 mb-1 block">🟤 준비물</label><input type="text" id="n_etc" value="물, 간식, 기타" class="w-full bg-white/5 h-[42px] rounded-xl text-white text-sm px-4"></div>

            <button id="btn_generate" class="neon-btn w-full h-[56px] mt-4 rounded-2xl flex items-center justify-center gap-2 font-black">✨ 일정 생성 & 안전 저장</button>

            <div id="n_result_box" class="hidden mt-6 p-5 bg-[#121422]/70 rounded-3xl border border-emerald-900/40">
                <p class="text-[10px] font-bold text-gray-600 mb-3 uppercase text-center">PREVIEW NOTICE</p>
                <div id="n_final_text" class="text-[11px] text-gray-300 leading-relaxed whitespace-pre-wrap mb-5 bg-black/20 p-4 rounded-xl border border-white/5 font-medium"></div>
                <button id="btn_copy" class="neon-btn w-full py-4 rounded-2xl text-sm font-black flex items-center justify-center gap-2">📋 COPY TEXT</button>
            </div>
        </div>
    </div>

    <div id="admin_modal" class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/60">
        <div class="bg-[#1a1c2e] w-full max-w-md rounded-[2.5rem] border border-white/10 p-6 overflow-hidden">
            <div id="auth_view">
                <h4 class="text-white font-black mb-4 uppercase text-center">Admin Access</h4>
                <input type="password" id="admin_input_pw" placeholder="암호 입력" class="w-full bg-white/5 h-12 rounded-xl text-white px-4 mb-4 text-center">
                <div class="flex gap-2"><button onclick="closeAdminModal()" class="flex-1 h-12 bg-gray-800 rounded-xl font-bold text-xs">취소</button><button id="btn_auth_submit" class="flex-1 h-12 bg-sky-600 rounded-xl font-bold text-xs text-white">확인</button></div>
            </div>
            <div id="draft_view" class="hidden">
                <div class="flex justify-between items-center mb-4"><h4 class="text-sky-400 font-black tracking-widest text-sm uppercase">Drafts Mgmt</h4><button onclick="closeAdminModal()" class="text-gray-500">✕</button></div>
                <div id="draft_list" class="space-y-3 max-h-[50vh] overflow-y-auto custom-scrollbar pr-1"></div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-app.js";
        import { getFirestore, doc, getDoc, getDocs, setDoc, deleteDoc, collection, serverTimestamp } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBoAh3V3WrHg_wo53g1LHM0UW3-y6w2deg",
            authDomain: "san-woori-db.firebaseapp.com",
            projectId: "san-woori-db",
            storageBucket: "san-woori-db.firebasestorage.app",
            messagingSenderId: "387585514110",
            appId: "1:387585514110:web:44749e6d92769fff6ad62f"
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const CACHE_KEY = "san_woori_mountains";
        const CACHE_TIME_KEY = "san_woori_cache_time";
        const UPDATE_INTERVAL = 1 * 60 * 60 * 1000; // 일반 사용자도 1시간마다 최신화
        let cachedMountains = [];

        // --- [실시간 연동형 데이터 로드 함수] ---
        const loadMountainsSmart = async (forceRefresh = false) => {
            const lastFetch = localStorage.getItem(CACHE_TIME_KEY);
            const now = Date.now();
            const localData = localStorage.getItem(CACHE_KEY);

            // 강제 새로고침이 아니고 캐시가 유효하면 캐시 사용
            if (!forceRefresh && localData && lastFetch && (now - lastFetch < UPDATE_INTERVAL)) {
                cachedMountains = JSON.parse(localData);
                renderOptions(cachedMountains);
                return;
            }

            try {
                const snap = await getDocs(collection(db, "mountains"));
                const list = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                localStorage.setItem(CACHE_KEY, JSON.stringify(list));
                localStorage.setItem(CACHE_TIME_KEY, now.toString());
                cachedMountains = list;
                renderOptions(list);
                console.log("DB 데이터가 최신으로 갱신되었습니다.");
            } catch (e) { console.error(e); }
        };

        const renderOptions = (list) => {
            const select = document.getElementById('official_mt_select');
            select.innerHTML = '<option value="">선택 ⛰️</option>';
            list.forEach(m => {
                // 집결지 정보가 제대로 있는 산만 선택 리스트에 표시
                if(m.meet && m.meet.trim() !== "" && m.meet !== "추후 공지") {
                    const opt = document.createElement('option');
                    opt.value = m.id; opt.innerText = m.id;
                    select.appendChild(opt);
                }
            });
        };

        const fillFields = (d) => {
            document.getElementById('n_meet').value = d.meet || '';
            document.getElementById('n_time_h').value = d.time_h || '';
            document.getElementById('n_time_m').value = d.time_m || '';
            document.getElementById('n_course').value = d.course || '';
            document.getElementById('n_dist').value = d.dist || '';
            document.getElementById('n_lv').value = d.lv || '하 (산책)';
        };

        // --- [이벤트 핸들러] ---
        document.getElementById('n_mt').addEventListener('input', (e) => {
            const mtName = e.target.value.trim();
            if(mtName.length >= 2) {
                const found = cachedMountains.find(m => m.id === mtName);
                if(found) fillFields(found);
            }
        });

        document.getElementById('official_mt_select').onchange = (e) => {
            const mtName = e.target.value;
            if(!mtName) return;
            document.getElementById('n_mt').value = mtName;
            const found = cachedMountains.find(m => m.id === mtName);
            if(found) fillFields(found);
        };

        document.getElementById('n_course').oninput = (e) => {
            if(e.target.value.includes('  ')) e.target.value = e.target.value.replace(/  /g, ' - ');
        };

        window.openAdminAuth = () => { document.getElementById('admin_modal').style.display = 'flex'; };
        window.closeAdminModal = () => { document.getElementById('admin_modal').style.display = 'none'; };

        document.getElementById('btn_auth_submit').onclick = async () => {
            const pw = document.getElementById('admin_input_pw').value;
            const config = await getDoc(doc(db, "admin_settings", "config"));
            if (config.exists() && config.data().admin_pw === pw) loadDrafts(); else alert("암호 오류");
        };

        const loadDrafts = async () => {
            document.getElementById('auth_view').classList.add('hidden');
            document.getElementById('draft_view').classList.remove('hidden');
            const list = document.getElementById('draft_list');
            const snap = await getDocs(collection(db, "mountain_drafts"));
            list.innerHTML = snap.empty ? '<p class="text-center py-10 text-gray-600 text-[10px]">등록된 제안이 없습니다.</p>' : "";
            snap.forEach(d => {
                const div = document.createElement('div');
                div.className = "bg-white/5 border border-white/5 p-3 rounded-2xl flex justify-between items-center";
                div.innerHTML = `<div class="flex-1"><p class="text-xs font-bold text-white">${d.id}</p></div><div class="flex gap-2"><button onclick="approveMt('${d.id}')" class="bg-emerald-600/20 text-emerald-400 border border-emerald-600/30 px-3 py-1.5 rounded-lg text-[10px] font-black">승인</button><button onclick="deleteDraft('${d.id}')" class="bg-red-600/20 text-red-400 border border-red-600/30 px-3 py-1.5 rounded-lg text-[10px] font-black">삭제</button></div>`;
                list.appendChild(div);
            });
        };

        // --- [관리자 승인 로직: 실시간 캐시 업데이트 반영] ---
        window.approveMt = async (id) => {
            if(!confirm(`'${id}' 정보를 공식 리스트로 이전하시겠습니까?\n(기존 좌표/높이 정보는 안전하게 병합됩니다)`)) return;
            
            const snap = await getDoc(doc(db, "mountain_drafts", id));
            if(snap.exists()) {
                // 1. { merge: true } 로 기존 필드(좌표/높이) 유지하며 데이터 합침
                await setDoc(doc(db, "mountains", id), { 
                    ...snap.data(), 
                    isOfficial: true,
                    updatedAt: serverTimestamp() 
                }, { merge: true });

                // 2. 임시 데이터 삭제
                await deleteDoc(doc(db, "mountain_drafts", id));

                // 3. 브라우저 로컬 캐시 즉시 비우기 (실시간 갱신의 핵심)
                localStorage.removeItem(CACHE_KEY);
                localStorage.removeItem(CACHE_TIME_KEY);

                alert("공식 반영 완료! ⛰️✨");
                
                // 4. 즉시 데이터 다시 로드해서 목록에 반영
                await loadMountainsSmart(true); 
                loadDrafts();
            }
        };

        window.deleteDraft = async (id) => {
            if(confirm(`제안을 삭제하시겠습니까?`)) { await deleteDoc(doc(db, "mountain_drafts", id)); loadDrafts(); }
        };

        // --- [공지 생성 및 제안 저장] ---
        document.getElementById('btn_generate').onclick = async () => {
            const mt = document.getElementById('n_mt').value.trim() || '미정';
            const pickupOpt = document.querySelector('input[name="n_pickup"]:checked');
            
            let pTag = ""; let pNotice = "";
            if (pickupOpt) {
                pTag = ` ${pickupOpt.value}`; 
                if (pickupOpt.id === 'p_ok') pNotice = `\n💢일자, 시간, 장소 조율 가능합니다\n    차량 픽업 관련 문의 서브방에 입장해주세요`;
            }

            const m = document.getElementById('n_month').value; const d = document.getElementById('n_day').value;
            const ampm = document.getElementById('n_ampm').value; const h = document.getElementById('n_hour').value;
            const min = document.getElementById('n_min').value || "00";
            const meet = document.getElementById('n_meet').value || '추후 공지';
            const th = document.getElementById('n_time_h').value; const tm = document.getElementById('n_time_m').value;
            const dur = th ? `약 ${th}시간${tm ? ` ${tm}분` : ""}` : "미정";
            const course = document.getElementById('n_course').value || '미정';
            const dist = document.getElementById('n_dist').value ? `${document.getElementById('n_dist').value}km` : '미정';
            const lv = document.getElementById('n_lv').value; const etc = document.getElementById('n_etc').value;

            const safety = `💢산행시 일어나는 모든 사건 사고는 본인의 \n    책임이므로 안전에 유의하여 산행하세요\n💢우천, 강풍 등 기상 악화 시 안전을 위해서 \n    모임이 취소될 수 있습니다\n💢참석자 유무 상황에 따라 시간 변경 및 \n    일정 취소될 수 있습니다`;
            const template = `[산:우리 산행 공지]\n🔴산행지: ${mt}${pTag}\n🟠일시: ${m}월 ${d}일 ${ampm} ${h}시 ${min}분\n🟡집결지: ${meet}\n🟢소요시간: ${dur}\n🔵산행코스: ${course}\n⚪️거리: ${dist}\n🟣난이도: ${lv}\n🟤준비물: ${etc}\n\n${safety}${pNotice}`;

            document.getElementById('n_final_text').innerText = template;
            document.getElementById('n_result_box').classList.remove('hidden');
            document.getElementById('n_result_box').scrollIntoView({ behavior: 'smooth' });

            if(mt !== '미정') {
                await setDoc(doc(db, "mountain_drafts", mt), {
                    meet, time_h: th, time_m: tm, course, dist: document.getElementById('n_dist').value, lv, updatedAt: serverTimestamp()
                }, { merge: true });
            }
        };

        document.getElementById('btn_copy').onclick = () => {
            navigator.clipboard.writeText(document.getElementById('n_final_text').innerText);
            alert("공지가 복사되었습니다! ✅");
        };

        loadMountainsSmart();
    </script>
</body>
</html>
