            <div>
                <label class="text-[9px] font-black text-gray-500 ml-1 mb-1 block uppercase">рҹҹ  мқјмӢң</label>

            <div class="grid grid-cols-2 gap-3">

            <div>
                <label class="text-[9px] font-black text-gray-500 ml-1 mb-1 block">рҹ”ө мӮ°н–үмҪ”мҠӨ (мҠӨнҺҳмқҙмҠӨ 3лІҲ = ' - ')</label>
                <input type="text" id="n_course" placeholder='мҪ”мҠӨлҘј мһ…л Ҙн•ҳм„ёмҡ”' class="w-full bg-white/5 h-[40px] rounded-xl text-white text-sm px-4">

                        <option value="мӨ‘ (м•Ҫк°„нһҳл“Ұ)">мӨ‘ (м•Ҫк°„нһҳл“Ұ)</option>
                        <option value="мӨ‘мғҒ (нһҳл“Ұ)">мӨ‘мғҒ (нһҳл“Ұ)</option>
                        <option value="мғҒ (л§Өмҡ°нһҳл“Ұ)">мғҒ (л§Өмҡ°нһҳл“Ұ)</option>
                    </select>
                </div>
            </div>

            <div>
                <label class="text-[9px] font-black text-gray-500 ml-1 mb-1 block">рҹҹӨ мӨҖл№„л¬ј</label>
                <input type="text" id="n_etc" value="л¬ј, к°„мӢқ, кё°нғҖ" class="w-full bg-white/5 h-[42px] rounded-xl text-white text-sm px-4">
            </div>

            <button id="btn_generate" class="neon-btn w-full h-[56px] mt-2 rounded-2xl flex items-center justify-center gap-2 font-black uppercase tracking-tighter">вңЁ мқјм • мғқм„ұ & м•Ҳм „ м ҖмһҘ</button>

                <button id="btn_copy" class="neon-btn w-full py-4 rounded-2xl text-sm font-black flex items-center justify-center gap-2 uppercase">рҹ“Ӣ Copy Text</button>

    <div id="admin_modal" class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/60" style="display:none;">
        <div class="bg-[#1a1c2e] w-full max-w-md rounded-[2.5rem] border border-white/10 p-6">
            <div id="auth_view">
                <h4 class="text-white font-black mb-4 uppercase text-center tracking-widest text-sm">Admin Access</h4>
                <input type="password" id="admin_input_pw" placeholder="м•”нҳё мһ…л Ҙ" class="w-full bg-white/5 h-12 rounded-xl text-white px-4 mb-4 text-center">

     <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-app.js";
    import { getFirestore, doc, getDoc, getDocs, setDoc, deleteDoc, collection, serverTimestamp, query, orderBy } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBoAh3V3WrHg_wo53g1LHM0UW3-y6w2deg",
        authDomain: "san-woori-db.firebaseapp.com",
        projectId: "san-woori-db",
        storageBucket: "san-woori-db.firebasestorage.app",
        messagingSenderId: "387585514110",
        appId: "1:387585514110:web:44749e6d92769fff6ad62f"
    };
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // [1] лҚ°мқҙн„° мғҒнғң л°Ҹ кё°мҙҲ н•ЁмҲҳ
    let cachedMountains = [];
    const getFavorites = () => JSON.parse(localStorage.getItem('my_favorites') || '[]');

    const fillFields = (d) => {
        document.getElementById('n_meet').value = d.meet || '';
        document.getElementById('n_time_h').value = d.time_h || '';
        document.getElementById('n_time_m').value = d.time_m || '';
        document.getElementById('n_course').value = d.course || '';
        document.getElementById('n_dist').value = d.dist || '';
        document.getElementById('n_lv').value = d.lv || 'н•ҳ (мӮ°мұ…)';
    };

    // [2] лҰ¬мҠӨнҠё л ҢлҚ”л§Ғ (мҰҗкІЁм°ҫкё° нҸ¬н•Ё)
    const renderSelectOptions = () => {
        const select = document.getElementById('official_mt_select');
        if (!select) return;

        const favs = getFavorites(); 
        const favoriteItems = cachedMountains.filter(m => favs.includes(m.id));
        const normalItems = cachedMountains.filter(m => !favs.includes(m.id));

        select.innerHTML = '<option value="">мқёмҰқ мӮ° вӣ°пёҸ</option>';

        if (favoriteItems.length > 0) {
            const groupLabel = document.createElement('option');
            groupLabel.textContent = "--- мҰҗкІЁм°ҫкё° вӯҗ ---";
            groupLabel.disabled = true;
            select.appendChild(groupLabel);

            favoriteItems.forEach(m => {
                const opt = document.createElement('option');
                opt.value = m.id;
                opt.innerText = `вӯҗ ${m.id}`;
                select.appendChild(opt);
            });

            const line = document.createElement('option');
            line.textContent = "------------------";
            line.disabled = true;
            select.appendChild(line);
        }

        normalItems.forEach(m => {
            if(m.type === 'official' && m.meet && m.meet !== "м¶”нӣ„ кіөм§Җ") {
                const opt = document.createElement('option');
                opt.value = m.id;
                opt.innerText = m.id;
                select.appendChild(opt);
            }
        });
    };

    // [3] лҚ°мқҙн„° лҸҷкё°нҷ”
    const syncMountains = async () => {
        try {
            const cachedData = localStorage.getItem('mt_cache');
            if (cachedData) {
                cachedMountains = JSON.parse(cachedData);
                renderSelectOptions();
            }

            const [officialSnap, draftSnap] = await Promise.all([
                getDocs(collection(db, "mountains")),
                getDocs(collection(db, "mountain_drafts"))
            ]);

            const officialList = officialSnap.docs.map(d => ({ id: d.id, ...d.data(), type: 'official' }));
            const draftList = draftSnap.docs.map(d => ({ id: d.id, ...d.data(), type: 'draft' }));

            const combined = [...officialList];
            draftList.forEach(d => { if (!combined.find(c => c.id === d.id)) combined.push(d); });

            combined.sort((a, b) => {
                const getPriority = (id) => {
                    if (id.includes("мў…мЈј")) return 2;
                    if (id.includes("м—°кі„")) return 1;
                    return 0;
                };
                const priorityA = getPriority(a.id);
                const priorityB = getPriority(b.id);
                if (priorityA !== priorityB) return priorityA - priorityB;
                return a.id.localeCompare(b.id, 'ko');
            });

            cachedMountains = combined;
            localStorage.setItem('mt_cache', JSON.stringify(combined));
            renderSelectOptions();
        } catch (e) { console.error("Sync Error:", e); }
    };

    // [4] мһ…л Ҙ м ңм–ҙ л°Ҹ мқҙлІӨнҠё мҙҲкё°нҷ”
    const initInputs = () => {
        const allInputIds = ['n_mt', 'n_meet', 'n_course', 'n_dist', 'n_time_h', 'n_time_m', 'n_etc'];
        allInputIds.forEach(id => {
            const el = document.getElementById(id);
            if (!el) return;
            el.setAttribute('autocomplete', 'off');
            el.setAttribute('spellcheck', 'false');

            if (id !== 'n_mt' && id !== 'n_etc') {
                el.addEventListener('focus', function() {
                    if (this.value !== "") setTimeout(() => { this.select(); }, 10);
                });
            }
        });

        document.getElementById('official_mt_select').onchange = (e) => {
            const mtName = e.target.value;
            if (!mtName) return;
            document.getElementById('n_mt').value = mtName;
            const found = cachedMountains.find(m => m.id === mtName);
            if (found) fillFields(found);
            document.getElementById('n_mt').blur();
        };

        document.getElementById('n_mt').addEventListener('input', (e) => {
            const found = cachedMountains.find(m => m.id === e.target.value.trim());
            if(found) fillFields(found);
        });

        document.getElementById('n_course').oninput = (e) => {
            if(e.target.value.includes('  ')) e.target.value = e.target.value.replace(/  /g, ' - ');
        };
    };

    // [5] м „м—ӯ н•ЁмҲҳ (Window к°қмІҙ л“ұлЎқ)
    window.toggleFavorite = (mtName, event) => {
        if(event) event.stopPropagation();
        let favs = getFavorites();
        favs = favs.includes(mtName) ? favs.filter(id => id !== mtName) : [...favs, mtName];
        localStorage.setItem('my_favorites', JSON.stringify(favs));
        renderSelectOptions(); 
    };

    window.openAdminAuth = () => { document.getElementById('admin_modal').style.display = 'flex'; };
    window.closeAdminModal = () => { document.getElementById('admin_modal').style.display = 'none'; };

    // [6] лІ„нҠј лҸҷмһ‘ лЎңм§Ғ
    document.getElementById('btn_generate').onclick = async () => {
        const mt = document.getElementById('n_mt').value.trim() || 'лҜём •';
        const pickupOpt = document.querySelector('input[name="n_pickup"]:checked');
        let pTag = pickupOpt ? ` ${pickupOpt.value}` : "";
        let pNotice = (pickupOpt && pickupOpt.id === 'p_ok') ? `\nрҹ’ўмқјмһҗ, мӢңк°„, мһҘмҶҢ мЎ°мңЁ к°ҖлҠҘн•©лӢҲлӢӨ\n    м°Ёлҹү н”Ҫм—… кҙҖл Ё л¬ёмқҳ м„ңлёҢл°©м—җ мһ…мһҘн•ҙмЈјм„ёмҡ”` : "";
        
        const m = document.getElementById('n_month').value; 
        const d = document.getElementById('n_day').value;
        const ampm = document.getElementById('n_ampm').value; 
        const h = document.getElementById('n_hour').value;
        const min = document.getElementById('n_min').value || "00";
        const meet = document.getElementById('n_meet').value || 'м¶”нӣ„ кіөм§Җ';
        const th = document.getElementById('n_time_h').value; 
        const tm = document.getElementById('n_time_m').value;
        const dur = th ? `м•Ҫ ${th}мӢңк°„${tm ? ` ${tm}л¶„` : ""}` : "лҜём •";
        const course = document.getElementById('n_course').value || 'лҜём •';
        const dist = document.getElementById('n_dist').value ? `${document.getElementById('n_dist').value}km` : 'лҜём •';
        const lv = document.getElementById('n_lv').value; 
        const etc = document.getElementById('n_etc').value;

        const safety = `рҹ’ўмӮ°н–үмӢң мқјм–ҙлӮҳлҠ” лӘЁл“  мӮ¬кұҙ мӮ¬кі лҠ” ліёмқёмқҳ \n    мұ…мһ„мқҙлҜҖлЎң м•Ҳм „м—җ мң мқҳн•ҳм—¬ мӮ°н–үн•ҳм„ёмҡ”\nрҹ’ўмҡ°мІң, к°•н’Қ л“ұ кё°мғҒ м•…нҷ” мӢң м•Ҳм „мқ„ мң„н•ҙм„ң \n    лӘЁмһ„мқҙ м·ЁмҶҢлҗ  мҲҳ мһҲмҠөлӢҲлӢӨ\nрҹ’ўм°ём„қмһҗ мң л¬ҙ мғҒнҷ©м—җ л”°лқј мӢңк°„ ліҖкІҪ л°Ҹ \n    мқјм • м·ЁмҶҢлҗ  мҲҳ мһҲмҠөлӢҲлӢӨ`;
        const template = `[мӮ°:мҡ°лҰ¬ мӮ°н–ү кіөм§Җ]\nрҹ”ҙмӮ°н–үм§Җ: ${mt}${pTag}\nрҹҹ мқјмӢң: ${m}мӣ” ${d}мқј ${ampm} ${h}мӢң ${min}л¶„\nрҹҹЎм§‘кІ°м§Җ: ${meet}\nрҹҹўмҶҢмҡ”мӢңк°„: ${dur}\nрҹ”өмӮ°н–үмҪ”мҠӨ: ${course}\nвҡӘпёҸкұ°лҰ¬: ${dist}\nрҹҹЈлӮңмқҙлҸ„: ${lv}\nрҹҹӨмӨҖл№„л¬ј: ${etc}\n\n${safety}${pNotice}`;

        document.getElementById('n_final_text').innerText = template;
        document.getElementById('n_result_box').classList.remove('hidden');
        document.getElementById('n_result_box').scrollIntoView({ behavior: 'smooth' });

        if(mt !== 'лҜём •') {
            await setDoc(doc(db, "mountain_drafts", mt), {
                meet, time_h: th, time_m: tm, course, dist: document.getElementById('n_dist').value, lv, updatedAt: serverTimestamp()
            }, { merge: true });
            await syncMountains(); 
        }
    };

    document.getElementById('btn_copy').onclick = () => {
        const finalText = document.getElementById('n_final_text').innerText;
        navigator.clipboard.writeText(finalText).then(() => {
            const btn = document.getElementById('btn_copy');
            const original = btn.innerText;
            btn.innerText = "вң… Copied!";
            setTimeout(() => { btn.innerText = original; }, 1500);
        });
    };

    // [7] кҙҖлҰ¬мһҗ кё°лҠҘ мғҒм„ё лЎңм§Ғ
    document.getElementById('btn_auth_submit').onclick = async () => {
        const pw = document.getElementById('admin_input_pw').value;
        const config = await getDoc(doc(db, "admin_settings", "config"));
        if (config.exists() && config.data().admin_pw === pw) {
            document.getElementById('auth_view').classList.add('hidden');
            document.getElementById('draft_view').classList.remove('hidden');
            loadDrafts();
        } else { alert("кҙҖлҰ¬мһҗ м•”нҳёк°Җ нӢҖлҰҪлӢҲлӢӨ."); }
    };

    const loadDrafts = async () => {
        const list_el = document.getElementById('draft_list');
        const snap = await getDocs(collection(db, "mountain_drafts"));
        list_el.innerHTML = snap.empty ? '<p class="text-center py-10 text-gray-600 text-[10px]">л“ұлЎқлҗң м ңм•Ҳмқҙ м—ҶмҠөлӢҲлӢӨ.</p>' : "";
        snap.forEach(d => {
            const div = document.createElement('div');
            div.className = "bg-white/5 border border-white/5 p-3 rounded-2xl flex justify-between items-center mb-2";
            div.innerHTML = `<div class="flex-1"><p class="text-xs font-bold text-white">${d.id}</p></div>
                <div class="flex gap-2">
                    <button onclick="approveMt('${d.id}')" class="bg-emerald-600/20 text-emerald-400 border border-emerald-600/30 px-3 py-1.5 rounded-lg text-[10px] font-black">мҠ№мқё</button>
                    <button onclick="deleteDraft('${d.id}')" class="bg-red-600/20 text-red-400 border border-red-600/30 px-3 py-1.5 rounded-lg text-[10px] font-black">мӮӯм ң</button>
                </div>`;
            list_el.appendChild(div);
        });
    };

    window.approveMt = async (id) => {
        if(!confirm(`'${id}' м •ліҙлҘј кіөмӢқ DBм—җ л°ҳмҳҒн• к№Ңмҡ”?`)) return;
        const snap = await getDoc(doc(db, "mountain_drafts", id));
        if(snap.exists()) {
            await setDoc(doc(db, "mountains", id), { ...snap.data(), isOfficial: true, updatedAt: serverTimestamp() }, { merge: true });
            await deleteDoc(doc(db, "mountain_drafts", id));
            localStorage.removeItem('mt_cache');
            await syncMountains(); 
            loadDrafts();
        }
    };

    window.deleteDraft = async (id) => {
        if(confirm(`мӮӯм ңн•ҳмӢңкІ мҠөлӢҲк№Ң?`)) { 
            await deleteDoc(doc(db, "mountain_drafts", id)); 
            await syncMountains();
            loadDrafts(); 
        }
    };

    // [8] мҙҲкё° мӢӨн–ү
    initInputs();
    syncMountains();

         // лі„ мғҒнғң м—…лҚ°мқҙнҠё (FILL мҶҚм„ұ нҸ¬н•Ё)
const updateFavIcon = () => {
    const mtName = document.getElementById('n_mt').value.trim();
    const icon = document.getElementById('fav_icon');
    const favs = getFavorites();
    
    if (mtName && mtName !== 'лҜём •' && favs.includes(mtName)) {
        icon.style.color = "#fbbf24"; // л…ёлһҖмғү
        icon.style.fontVariationSettings = "'FILL' 1, 'wght' 400"; // лі„ мұ„мҡ°кё°
    } else {
        icon.style.color = "#6b7280"; // кё°ліё нҡҢмғү
        icon.style.fontVariationSettings = "'FILL' 0, 'wght' 400"; // л№Ҳ лі„
    }
};

// нҒҙлҰӯ мӢң нҶ кёҖ л°Ҹ лҰ¬мҠӨнҠё к°ұмӢ 
document.getElementById('btn_fav_toggle').onclick = (e) => {
    e.preventDefault(); // нҸј м ңм¶ң л°©м§Җ
    const mtName = document.getElementById('n_mt').value.trim();
    if (!mtName || mtName === 'лҜём •') return;
    
    // кё°мЎҙм—җ м„ м–ёлҗң toggleFavorite нҳём¶ң
    window.toggleFavorite(mtName);
    updateFavIcon();
};

// мһ…л Ҙм°Ҫ л°Ҹ м…Җл үнҠё л°•мҠӨ м—°лҸҷ
document.getElementById('n_mt').addEventListener('input', updateFavIcon);
document.getElementById('official_mt_select').addEventListener('change', () => {
    setTimeout(updateFavIcon, 100); 
});

</script>
 </body>
